[common]
extract_scope =belleii

[client]
rucio_host = https://blrucio.sdcc.bnl.gov:443
auth_host = https://blrucio.sdcc.bnl.gov:443
request_retries = 3
oidc_audience = rucio
oidc_polling = true
oidc_scope = openid profile email

[policy]
permission=belleii
schema=belleii
lfn2pfn_algorithm_default=belleii

[trace]
trace_host=https://blruciotracer.sdcc.bnl.gov:443

[download]
preferred_impl=rucio.rse.protocols.gfal.Default
