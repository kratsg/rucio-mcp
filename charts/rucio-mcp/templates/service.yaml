apiVersion: v1
kind: Service
metadata:
  name: {{ include "rucio-mcp.fullname" . }}
  labels:
    {{- include "rucio-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
    - name: metrics
      protocol: TCP
      port: {{ .Values.server.metricsPort }}
      targetPort: metrics
  selector:
    {{- include "rucio-mcp.selectorLabels" . | nindent 4 }}
