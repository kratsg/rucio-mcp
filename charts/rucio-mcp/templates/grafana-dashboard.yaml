{{- if .Values.grafanaDashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rucio-mcp.fullname" . }}-grafana-dashboard
  {{- with .Values.grafanaDashboard.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "rucio-mcp.labels" . | nindent 4 }}
    {{- with .Values.grafanaDashboard.label }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  rucio-mcp-dashboard.json: |-
    {{- .Files.Get "dashboards/rucio-mcp.json" | nindent 4 }}
{{- end }}
