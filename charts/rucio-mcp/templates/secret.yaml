{{- if and (eq .Values.auth.mode "sharedSecret") (not .Values.auth.sharedSecret.existingSecret) -}}
{{- include "rucio-mcp.validate" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rucio-mcp.sharedSecretName" . }}
  labels:
    {{- include "rucio-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  shared-secret: {{ .Values.auth.sharedSecret.secretValue | quote }}
{{- end }}
